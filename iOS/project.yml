name: BreathCount
options:
  bundleIdPrefix: com.shimondeitel.breathcount
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BreathCount:
    type: application
    platform: iOS
    sources:
      - path: BreathCount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.breathcount
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BreathCount/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BreathCountTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BreathCountTests
      - path: BreathCount.storekit
    dependencies:
      - target: BreathCount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.breathcount.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BreathCountUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BreathCountUITests
    dependencies:
      - target: BreathCount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.breathcount.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BreathCount:
    build:
      targets:
        BreathCount: all
        BreathCountTests: [test]
        BreathCountUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BreathCount.storekit
    test:
      config: Debug
      storeKitConfiguration: BreathCount.storekit
      targets:
        - BreathCountTests
        - BreathCountUITests
    archive:
      config: Release
